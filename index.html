    .trapezium {
      overflow: hidden;
      position: relative;
      height: 200px; /* Adjust the height according to your requirement */
      width: 200px; /* Adjust the width according to your requirement */
    }
    
    .trapezium .carousel-inner {
      height: 100%;
      
    }
    
    .trapezium .carousel-item {
      height: 150%; /* Height more than 100% to make it trapezium-shaped */
      transition: transform 0.6s ease;
      transform-origin: 0 50%;
      position: absolute;
      background-color: #01648b; /* Light gray background */

      /* background-color: white; Light gray background */
    }
    
    .trapezium .carousel-item.active {
      transform: skewX(60deg) translateX(200%); /* Skewing and translating to create trapezium effect */
      z-index: 1;
      transition-delay: 2s;
      background-color: transparent; /* Light gray background */

      /* opacity: 0; */
    }
    
    .trapezium .carousel-item.next {
      transform: skewX(45deg) translateX(200%); /* Move next slide off to the right */
      z-index: 0;
    }
    
    .trapezium .carousel-item.prev {
      transform: skewX(45deg) translateX(-200%); /* Skew and translate to make the previous slide disappear */
      opacity: 0; /* Hide the previous slide when fully skewed */
      z-index: 0;
    }

<script>
  // JavaScript to dynamically adjust the triangle's height based on the video's height
  $(document).ready(function() {

    if (window.matchMedia('(min-width: 992px)').matches) {
      
      const video = document.querySelector('.video-wrapper');
      const wr=document.querySelector('.wrapper')
      const triangle = document.querySelector('.triangle');
      
      console.log(wr.clientHeight)
      
        const videoHeight = video.clientHeight;
        const videoW = video.clientWidth;
        console.log(videoHeight);
        triangle.style.borderWidth = `0 ${videoW/6}px ${videoHeight  +10}px 0`;
        wr.style.height=(videoHeight+10)+'px';
    } 
    });
    
    // Update triangle height on window resize
    window.addEventListener('resize', function() {

      if (window.matchMedia('(min-width: 992px)').matches) {
        const video = document.querySelector('.video-wrapper');
        const triangle = document.querySelector('.triangle');
        const videoHeight = video.clientHeight;
        const videoW = video.clientWidth;
        const wr=document.querySelector('.wrapper')
        console.log(wr.clientHeight)
        
        
        triangle.style.borderWidth = `0 ${videoW/6}px ${videoHeight - 1}px 0`;
        wr.style.height=(videoHeight+10)+'px';
 
} 



    });
